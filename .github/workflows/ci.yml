name: CI

on:
  push:
    # master = private dev repo; main = public release repo (imaksligais/atmina-lv).
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs when a new push lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply twikit local patches
        run: python scripts/patch_twikit.py

      - name: Install Playwright browser
        # The render byte-identical tests and the social quote-card render
        # generate PNGs / og-images by launching Chromium via Playwright. The
        # pip package ships no browser binary, so CI must fetch it (+ system
        # libs) or those tests error at BrowserType.launch.
        run: python -m playwright install --with-deps chromium

      - name: ruff check
        run: python -m ruff check src scripts tests

      - name: pytest
        # CI runs the fast suite only:
        # - `integration` tests hit real APIs (Twitter / Saeima / Anthropic) — no credentials in CI
        # - `slow` tests exceed 5s each — skipped to keep CI under timeout
        # The full suite + generate_public_site smoke run locally via `bash scripts/check.sh`
        # (developer's last-mile gate; needs a populated data/atmina.db fixture).
        run: python -m pytest tests -q -m "not integration and not slow"
