<!-- Vidžets: ass-zalais — zaļais kurss (zonas + partijas no dizaina doka). -->
<div class="syn-w">
  <div class="syn-axis-zones">

    <div class="syn-zone syn-zone-pole-b">
      <div class="syn-zone-label">Klimatneitralitāte</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">PRO</span>
      </div>
    </div>

    <div class="syn-zone syn-zone-mid">
      <div class="syn-zone-label">Pārskatīt / pakārtot konkurētspējai</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">AS</span>
        <span class="syn-chip">ZZS</span>
        <span class="syn-chip">MMN</span>
        <span class="syn-chip">NA</span>
        <span class="syn-chip">LA</span>
      </div>
    </div>

    <div class="syn-zone syn-zone-pole-a">
      <div class="syn-zone-label">Atteikties</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">SV-AJ</span>
      </div>
    </div>

  </div>

  <div class="syn-axis-silent">
    <span class="syn-axis-silent-label">Nemin:</span>
    <span class="syn-chip syn-chip-muted">ASL</span>
    <span class="syn-chip syn-chip-muted">GS</span>
    <span class="syn-chip syn-chip-muted">JKP</span>
    <span class="syn-chip syn-chip-muted">JV</span>
    <span class="syn-chip syn-chip-muted">LPV</span>
    <span class="syn-chip syn-chip-muted">SC</span>
    <span class="syn-chip syn-chip-muted">ST</span>
  </div>
</div>
