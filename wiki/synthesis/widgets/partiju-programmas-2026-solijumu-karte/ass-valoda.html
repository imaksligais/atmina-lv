<!-- Vidžets: ass-valoda — valodu politika (zonas + partijas no dizaina doka). -->
<div class="syn-w">
  <div class="syn-axis-zones">

    <div class="syn-zone syn-zone-pole-a">
      <div class="syn-zone-label">Stingrāks valsts valodas režīms</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">ASL</span>
        <span class="syn-chip">NA</span>
        <span class="syn-chip">JKP</span>
        <span class="syn-chip">JV</span>
      </div>
    </div>

    <div class="syn-zone syn-zone-mid">
      <div class="syn-zone-label">Cits virziens</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">LPV</span>
      </div>
      <div class="syn-zone-note">LPV — angļu valoda kā oficiālā starptautiskā biznesa valoda.</div>
    </div>

    <div class="syn-zone syn-zone-pole-b">
      <div class="syn-zone-label">Plašākas mazākumtautību valodu tiesības</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">ST</span>
        <span class="syn-chip">SV-AJ</span>
        <span class="syn-chip">SC</span>
      </div>
    </div>

  </div>

  <div class="syn-axis-silent">
    <span class="syn-axis-silent-label">Atsevišķas pozīcijas nav:</span>
    <span class="syn-chip syn-chip-muted">AS</span>
    <span class="syn-chip syn-chip-muted">GS</span>
    <span class="syn-chip syn-chip-muted">LA</span>
    <span class="syn-chip syn-chip-muted">MMN</span>
    <span class="syn-chip syn-chip-muted">PRO</span>
    <span class="syn-chip syn-chip-muted">ZZS</span>
  </div>
</div>
