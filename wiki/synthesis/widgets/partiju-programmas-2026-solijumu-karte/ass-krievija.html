<!-- Vidžets: ass-krievija — Krievija/Ukraina/drošības arhitektūra (zonas + partijas no dizaina doka). -->
<div class="syn-w">
  <div class="syn-axis-zones">

    <div class="syn-zone syn-zone-pole-a">
      <div class="syn-zone-label">Pārraut saites</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">ASL</span>
        <span class="syn-chip">NA</span>
      </div>
    </div>

    <div class="syn-zone syn-zone-pole-b">
      <div class="syn-zone-label">Atbalsts Ukrainai</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">JV</span>
        <span class="syn-chip">LA</span>
        <span class="syn-chip">AS</span>
        <span class="syn-chip">ZZS</span>
        <span class="syn-chip">JKP</span>
        <span class="syn-chip">LPV</span>
      </div>
      <div class="syn-zone-note">LPV — šaurāks atbalsts (tikai Ukrainas uzņemšana ES).</div>
    </div>

    <div class="syn-zone syn-zone-mid">
      <div class="syn-zone-label">Starppozīcija</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">SC</span>
      </div>
    </div>

    <div class="syn-zone syn-zone-neutral">
      <div class="syn-zone-label">Neitralitāte / neiesaistīšanās</div>
      <div class="syn-zone-chips">
        <span class="syn-chip">GS</span>
        <span class="syn-chip">SV-AJ</span>
        <span class="syn-chip">ST</span>
      </div>
    </div>

  </div>

  <div class="syn-axis-silent">
    <span class="syn-axis-silent-label">Nemin:</span>
    <span class="syn-chip syn-chip-muted">MMN</span>
    <span class="syn-chip syn-chip-muted">PRO</span>
  </div>
</div>
