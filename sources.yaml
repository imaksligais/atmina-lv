        value: 'Izdevējs ir SIA "Mediju nams" (reģ. nr. 40003610627); pēc komercreģistra datiem 100% kapitāldaļu pieder SIA "ASKO R" (reģ. nr. 52403006871, Rēzekne).'
        source_url: "https://www.firmas.lv/lv/uznemumi/mediju-nams/40003610627"
