      - field: funding_model
        value: 'Privāts komercmedijs; ienākumus veido reklāma un maksas abonementi ("Delfi Plus"). Daļa satura ir bezmaksas, daļa pieejama tikai abonentiem.'
        source_url: "https://lv.wikipedia.org/wiki/Delfi_(port%C4%81ls)"
        as_of: "2026-06-01"
      - field: legal_form
        value: 'Akciju sabiedrība (AS) "DELFI", reģistrācijas numurs 40003504352, reģistrēta Latvijas Republikas komercreģistrā.'
        source_url: "https://www.firmas.lv/profile/delfi-as/40003504352"
        as_of: "2026-06-01"
      - field: editorial_leadership
        value: 'Portāla "Delfi" galvenais redaktors ir Filips Lastovskis.'
        source_url: "https://www.lsm.lv/raksts/zinas/latvija/22.03.2024-zurnalistu-asociaciju-turpmak-vadis-delfi-galvenais-redaktors-lastovskis.a547778/"
        as_of: "2026-06-01"
      - field: founded
