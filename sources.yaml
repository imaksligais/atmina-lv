# Media-outlet registry (consumed by src/outlets.py → mediji.html pages).
# Identity + sourced transparency facts. `facts` is filled per-outlet by the
# @outlet-researcher agent (each fact MUST carry a source_url, or it is dropped
# at read time — mirrors the claims "no source_url → dropped" rule). Feeds above
# are grouped to these outlets via their `outlet:` tag.
outlets:
  - short_name: lsm
    name: "Latvijas Sabiedriskie mediji (LSM)"
    type: public_tv
    language: lv
    hosts: ["lsm.lv"]
    x_handle: "ltvzinas"
    x_feeds: ["ltvzinas", "ltvpanorama", "ltvdefacto", "Krustpunkta", "KNL_LTV1"]
    website: "https://www.lsm.lv"
    description: "Latvijas sabiedriskais medijs — LTV un Latvijas Radio kopējais ziņu portāls."
    facts:
      - field: owner
        value: 'Sabiedriskais elektroniskais plašsaziņas līdzeklis; kapitālsabiedrība, kurā visas kapitāla daļas (100%) pieder valstij. Valsts kapitāla daļu turētāja ir Sabiedrisko elektronisko plašsaziņas līdzekļu padome (SEPLP).'
        source_url: "https://www.seplp.lv/lv/par-mums/kapitalsabiedribas"
        as_of: "2026-06-01"
      - field: funding_model
        value: 'Finansējumu galvenokārt veido valsts budžeta dotācija sabiedriskā pasūtījuma īstenošanai. 2025. gadam apstiprinātais kopējais budžets ir 51 359 239 euro.'
        source_url: "https://www.seplp.lv/lv/jaunums/apvienotais-sabiedriskais-medijs-darbu-saks-ar-jaudigu-sabiedriska-pasutijuma-planu-un-budzetu"
        as_of: "2026-06-01"
      - field: legal_form
        value: 'Valsts sabiedrība ar ierobežotu atbildību (VSIA) "Latvijas Sabiedriskais medijs"; darbību regulē Sabiedrisko elektronisko plašsaziņas līdzekļu un to pārvaldības likums.'
        source_url: "https://www.seplp.lv/lv/par-mums/kapitalsabiedribas"
        as_of: "2026-06-01"
      - field: editorial_leadership
        value: 'Galvenā redaktore ir Anita Brauna, kura amatā stājās 2025. gada 1. jūnijā.'
        source_url: "https://www.tvnet.lv/8259802/lsm-galvena-redaktora-amata-darbu-sak-anita-brauna"
        as_of: "2026-06-01"
      - field: founded
        value: 'Apvienotā VSIA "Latvijas Sabiedriskais medijs" reģistrēta komercreģistrā un darbu sāka 2025. gada 2. janvārī, apvienojot Latvijas Radio (dibināts 1925. gadā), Latvijas Televīziju (1954. gadā) un portālu LSM.lv (2013. gadā).'
        source_url: "https://www.seplp.lv/lv/jaunums/darbu-sacis-apvienotais-latvijas-sabiedriskais-medijs"
        as_of: "2026-06-01"

  - short_name: diena
    name: "Diena"
    type: print
    language: lv
    hosts: ["diena.lv"]
    website: "https://www.diena.lv"
    description: "Latvijas dienas laikraksts un ziņu portāls."
    facts:
      - field: owner
        value: 'Laikraksta izdevējs ir SIA "Izdevniecība Dienas Mediji" (reģ. nr. 40003804497). Saskaņā ar Latvijas uzņēmumu reģistra datiem vienīgais dalībnieks ar 100% kapitāldaļu (no 17.11.2015) ir fiziska persona; publiski tas ir Edgars Kots, kurš ir arī sabiedrības valdes priekšsēdētājs.'
        source_url: "https://firmas.lv/profile/izdevnieciba-dienas-mediji/40003804497"
        as_of: "2026-06-01"
      - field: funding_model
        value: 'Privāts izdevums; finansējumu gūst galvenokārt no abonēšanas, laikraksta un satura pārdošanas, maksas satura (paywall) un reklāmas.'
        source_url: "https://www.diena.lv/izdevnieciba-dienas-mediji/abonesanas-iespejas/"
        as_of: "2026-06-01"
      - field: legal_form
        value: 'Sabiedrība ar ierobežotu atbildību (SIA). Izdevējs: SIA "Izdevniecība Dienas Mediji", reģ. nr. 40003804497, reģistrēta 20.02.2006.'
        source_url: "https://firmas.lv/profile/izdevnieciba-dienas-mediji/40003804497"
        as_of: "2026-06-01"
      - field: editorial_leadership
        value: 'Laikraksta "Diena" galvenais redaktors ir Gatis Madžiņš (amatā kopš 10.05.2013).'
        source_url: "https://www.diena.lv/izdevnieciba-dienas-mediji/par-mums/"
        as_of: "2026-06-01"
      - field: founded
        value: 'Dibināts 1990. gadā; pirmais laikraksta "Diena" numurs iznāca 1990. gada 23. novembrī.'
        source_url: "https://lv.wikipedia.org/wiki/Diena_(laikraksts)"
        as_of: "2026-06-01"

  - short_name: tvnet
    name: "TVNet"
    type: online
    language: lv
    hosts: ["tvnet.lv"]
    website: "https://www.tvnet.lv"
    description: "Latvijas ziņu un izklaides portāls."
    facts:
      - field: owner
        value: 'Portālu TVNET pārvalda SIA "TVNET GRUPA" (reģistrācijas nr. 40003490052), kuras vienīgais (100%) dalībnieks ir Igaunijas uzņēmums AS Postimees Grupp (Igaunijas reģ. nr. 10184643), kas savukārt ietilpst Igaunijas koncernā MM Grupp OÜ.'
        source_url: "https://www.firmas.lv/lv/uznemumi/tvnet-grupa/40003490052"
        as_of: "2026-06-01"
      - field: funding_model
        value: 'Privāts komercmedijs; ieņēmumus galvenokārt veido reklāma un maksas satura abonementi, ko papildina satura projekti, digitalizācijas iniciatīvas un citi ieņēmumi.'
        source_url: "https://tvnetgrupa.lv/par-mums/"
        as_of: "2026-06-01"
      - field: legal_form
        value: 'Sabiedrība ar ierobežotu atbildību (SIA) — SIA "TVNET GRUPA", reģistrācijas nr. 40003490052, reģistrēta Latvijas Republikas Uzņēmumu reģistrā 2000. gada 11. aprīlī.'
        source_url: "https://www.firmas.lv/lv/uznemumi/tvnet-grupa/40003490052"
        as_of: "2026-06-01"
      - field: editorial_leadership
        value: 'TVNET galvenā redaktore (gan latviešu, gan krievu redakcijā) ir Ērika Staškeviča, kas amatā stājās 2024. gadā. TVNET GRUPAS galvenais redaktors ir Toms Ostrovskis.'
        source_url: "https://www.tvnet.lv/8146843/darbu-sak-tvnet-galvena-redaktore-erika-staskevica"
        as_of: "2026-06-01"
      - field: founded
        value: 'Portāls tvnet.lv darbojas kopš 2000. gada; pirmais raksts publicēts 2000. gada 21. jūnijā.'
        source_url: "https://lv.wikipedia.org/wiki/Tvnet.lv"
        as_of: "2026-06-01"

  - short_name: delfi
    name: "Delfi"
    type: online
    language: lv
    hosts: ["delfi.lv"]
    website: "https://www.delfi.lv"
    description: "Viens no lielākajiem Latvijas ziņu portāliem."
    facts:
      - field: owner
        value: 'Akciju sabiedrības "DELFI" 100% akciju (2 286 919 akcijas) pieder Igaunijas uzņēmumam "Aktsiaselts Ekspress Grupp" (reģ. Nr. 10004677, Tallina, Igaunija).'
        source_url: "https://www.firmas.lv/profile/delfi-as/40003504352"
