        as_of: "2026-06-01"
      - field: founded
        value: 'Laikraksts "Neatkarīgā Rīta Avīze" ar šo nosaukumu sāka iznākt 1995. gada 1. jūlijā; izdevuma pirmsākumi meklējami padomju laika laikrakstā "Cīņa" (kopš 1904), kas pēc 1990. gada kļuva par "Neatkarīgo Cīņu" un vēlāk par "Neatkarīgo Rīta Avīzi". Kopš 2020. gada 5. maija iznāk tikai digitāli (portālā nra.lv); pēdējais drukātais izdevums iznāca 2020. gada 30. aprīlī.'
        source_url: "https://en.wikipedia.org/wiki/Neatkar%C4%ABg%C4%81_R%C4%ABta_Av%C4%ABze"
