        source_url: "https://lv.wikipedia.org/wiki/Delfi_(port%C4%81ls)"
        as_of: "2026-06-01"

  - short_name: leta
    name: "LETA"
    type: agency
    language: lv
    hosts: ["leta.lv"]
    x_handle: "letanewslv"
    x_feeds: ["letanewslv"]
    website: "https://www.leta.lv"
    description: "Latvijas nacionālā ziņu aģentūra."
    facts:
      - field: owner
        value: 'LETA ir privāts uzņēmums. Saskaņā ar uzņēmumu reģistra datiem (firmas.lv) tiešais daļu turētājs ir Igaunijā reģistrētā Balti Meediamonitooringu Grupp OÜ ar 95% daļu un fiziska persona ar 5% daļu. Patiesais labuma guvējs grupas struktūrā ir Marguss Linnamē (Margus Linnamäe).'
        source_url: "https://www.firmas.lv/lv/uznemumi/leta/40003229349"
        as_of: "2026-06-01"
      - field: funding_model
        value: 'Komerciāls finansējuma modelis: ieņēmumi no informācijas produktu un pakalpojumu (ziņu abonementu, fotoattēlu, mediju monitoringa u.c.) pārdošanas klientiem. LETA nav valsts budžeta finansēts sabiedriskais medijs.'
        source_url: "https://www.leta.lv/info_pages/about/"
        as_of: "2026-06-01"
      - field: legal_form
        value: 'Sabiedrība ar ierobežotu atbildību (SIA), reģistrācijas numurs 40003229349, reģistrēta Latvijas Republikas Uzņēmumu reģistrā.'
        source_url: "https://www.firmas.lv/lv/uznemumi/leta/40003229349"
        as_of: "2026-06-01"
      - field: editorial_leadership
        value: 'Ziņu redakcijas galvenais redaktors ir Pēteris Zirnis.'
        source_url: "https://www.leta.lv/info_pages/contacts/"
        as_of: "2026-06-01"
      - field: founded
        value: 'Aģentūra LETA (Latvijas Telegrāfa aģentūra) izveidota 1920. gadā; tās priekštecis bija 1919. gada martā dibinātais Latvijas preses birojs Latopress. Pirmais aģentūras direktors bija Rihards Bērziņš.'
        source_url: "https://en.wikipedia.org/wiki/LETA"
        as_of: "2026-06-01"

  - short_name: nra
    name: "Neatkarīgā Rīta Avīze (nra.lv)"
