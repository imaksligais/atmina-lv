    last_tos_review: "2026-04-29"

  # Tier 3: Manual-only — vestnesis_lv requires two-stage fetch (RSS gives
  # only title+link), runs via scripts/ingest_vestnesis.py. Tier 3 keeps
  # ingest_all() out of it; the manual script reads from this YAML row to
  # auto-create/look-up the source.
  - url: "https://www.vestnesis.lv/feed/JL"
    name: "Latvijas Vēstnesis JL"
    outlet: vestnesis
    framing: "Oficiālais laidiens — promulgētie tiesību akti, MK noteikumi, rīkojumi, ST nolēmumi. Faktoloģisks, bez interpretācijas; politiķu junction caur parakstītājiem."
    tier: 3
    fetcher_mode: "fetcher"
    rate_limit_seconds: 60
    legal_status: "approved"
    legal_notes: "Latvijas Vēstnesis (vestnesis.lv) JL — Jaunumi Laidienā RSS. Two-stage fetch: RSS dod tikai title+link, body fetch caur /ta/id/<N> ar trafilatura. MANUĀLS INGEST TIKAI — palaid via scripts/ingest_vestnesis.py. Tier 3 nodrošina, ka ingest_all() to neielādē kā parastu RSS (kas radītu title-only stub)."
    last_tos_review: "2026-04-30"

