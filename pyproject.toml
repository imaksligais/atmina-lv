[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: integration tests that may hit real APIs / external services",
    "slow: long-running tests (>5s) — exclude with `-m 'not slow'` in fast loops",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    ".venv",
    "output",
    "data",
    ".scratch",
    "scripts/_scratch",
]

[tool.ruff.lint]
# Phase 0 baseline — green from day one. Cosmetic categories (I001 imports,
# UP015/UP017 modernization, F541 f-string placeholders) are silenced and
# treated as later-phase cleanup, not P0 blockers. Real bugs (F401/F841/F811,
# E711, B033, B905) stay enabled — see [tool.ruff.lint.per-file-ignores]
# below for tactical suppressions in test fixtures only.
select = ["E", "F", "I", "B", "UP", "ARG"]
ignore = [
    "E501",   # line-too-long — many existing 100+ lines, not Phase 0 scope
    "E741",   # ambiguous variable name (l, I) — minor cosmetic
    "I001",   # unsorted imports — 159 hits, defer to dedicated cleanup
    "B008",   # function call in default argument — common Pydantic pattern
    "B904",   # raise from — many existing call sites
    "ARG001", # unused function argument — common in callbacks
    "ARG002", # unused method argument — abstract methods, monkeypatch fakes
    "ARG004", # unused static method argument
    "UP006",  # use list/dict not List/Dict — codebase still mixes
    "UP007",  # use X | Y not Union — same
    "UP015",  # redundant open mode "r" — cosmetic
    "UP017",  # datetime.UTC alias — cosmetic
    "UP035",  # deprecated import (typing.List etc) — same as UP006
    "UP045",  # X | None instead of Optional[X] — same as UP007
    "F541",   # f-string without placeholders — false positive on translations
]

[tool.ruff.lint.per-file-ignores]
# Test files: pytest fixtures and monkeypatch lambdas legitimately have
# unused arguments and intentional `import` side-effects. Don't fight them.
"tests/*" = ["E402", "F401", "F811", "F841", "B007", "B011", "B017", "ARG005", "E711"]
"scripts/*" = ["E402", "F401", "F841", "ARG005", "B007", "E401", "E701", "B905", "UP009"]
# Monolith modules slated for Phase 1-4 split — defer style cleanup to
# the refactor that touches them.
"src/generate.py" = ["E402", "F401", "F841", "B007", "UP031", "E702"]
"src/ingest.py" = ["E402", "F401", "F841", "B007", "B005"]
"src/db.py" = ["E402", "F401", "F841"]
# Pre-existing findings in modules NOT slated for refactor — documented as
# known tech debt, cleanup in later phase. Each entry here is an "accepted
# baseline" entry per Phase 0 rule "ruff exit count documented or accepted".
"src/embeddings.py" = ["B905"]
"src/graphics/storage.py" = ["B905"]
"src/quality.py" = ["B033"]
"src/social_agent/cli.py" = ["F401"]
"src/social_agent/drafters.py" = ["F841"]
"src/video_ingest/cli.py" = ["F401", "F841"]
"src/video_ingest/heuristics.py" = ["F401", "F841"]
"src/video_ingest/state.py" = ["UP042"]
